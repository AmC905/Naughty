<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For You</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>

body {
  margin:0;
  height:100vh;
  background:black;
  overflow:hidden;
  font-family: -apple-system,BlinkMacSystemFont;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  transition:all 2s ease;
}

body.unlocked {
  background:
  radial-gradient(circle at center,
  rgba(255,255,255,0.15) 0%,
  rgba(0,0,0,1) 70%);
  animation: zoombg 6s ease forwards;
}

@keyframes zoombg {
  from {background-size:100%;}
  to {background-size:140%;}
}

.card {
  background:#111;
  padding:40px;
  border-radius:20px;
  text-align:center;
  transition:opacity 1.5s ease;
}

.fadeout {
  opacity:0;
}

#story {
  position:absolute;
  top:20%;
  width:60%;
  max-height:60vh;
  overflow-y:auto;
  text-align:left;
  opacity:0;
}

.line {
  font-size:28px;
  margin:30px 0;
  opacity:0;
  transform:translateY(40px);
  animation: editorial 1.8s ease forwards;
}

@keyframes editorial {
  to {
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="card" id="card">
<input type="password" id="pwd" placeholder="Password">
<button onclick="unlock()">Unlock</button>
</div>

<div id="story"></div>

<script>

//🔐 密碼
const PASSWORD = "1031"

//🔐 加密內容（AES）
const encrypted = [
"U2FsdGVkX1+z5Z0w8h5hZ+9fH5sEN+ZfxU7R2nh...",
"U2FsdGVkX19Jdfsdklfsdfjlskdfjls...",
"U2FsdGVkX19asd9f8a9sdf89a7sdf...",
"U2FsdGVkX1+asdf89asdf89asdf...",
"U2FsdGVkX1+asd89f7as9df8a9sdf...",
"U2FsdGVkX1+adsf89a7sd9f8as7df...",
"U2FsdGVkX1+asdf9a87sdf9a87sdf...",
"U2FsdGVkX19asdf8a7sd9f8a7sdf...",
"U2FsdGVkX1+asdf9a87sd9f87asd...",
"U2FsdGVkX1+asdf89a7sd9f8a7sd...",
"U2FsdGVkX1+asdf89a7sd9f8a7sd...",
"U2FsdGVkX1+asdf89a7sd9f8a7sd...",
"U2FsdGVkX1+asdf89a7sd9f8a7sd...",
"U2FsdGVkX1+asdf89a7sd9f8a7sd..."
]

function unlock(){

let p = document.getElementById("pwd").value

if(p !== PASSWORD){
alert("Wrong Password")
return
}

document.getElementById("card").classList.add("fadeout")
document.body.classList.add("unlocked")

setTimeout(showStory,1500)

}

function showStory(){

let story = document.getElementById("story")
story.style.opacity = 1

encrypted.forEach((e,i)=>{

let txt = CryptoJS.AES.decrypt(e,PASSWORD)
.toString(CryptoJS.enc.Utf8)

let div = document.createElement("div")
div.className="line"
div.innerHTML = txt

setTimeout(()=>{
story.appendChild(div)

story.scrollTo({
top:story.scrollHeight,
behavior:"smooth"
})

},i*2500)

})

}

</script>

</body>
</html>
